#file: noinspection YAMLSchemaValidation
spring:
  application:
    name: screener-backend
  main:
    # CRITICAL: prevents spring-boot-starter-webflux from hijacking the server to Netty reactive.
    # WebFlux is on the classpath only for WebClient — the application runs on Tomcat/MVC.
    web-application-type: servlet

  datasource:
    url: "${DB_URL:}"
    username: "${DB_USER:}"
    password: "${DB_PASSWORD:}"
    hikari:
      maximum-pool-size: 10
      connection-timeout: 3000

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:}
    open-in-view: false

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 4

screener:
  admin:
    # Comma-separated emails promoted to ADMIN on startup. Empty in the repo on purpose —
    # the real list is supplied via the SCREENER_ADMIN_EMAILS environment variable in the
    # deployment environment, so admin identities are never committed.
    emails: "${SCREENER_ADMIN_EMAILS:}"

  binance:
    spot-base-url: https://api.binance.com
    futures-base-url: https://fapi.binance.com
    # Binance exchangeInfo responses exceed 16 MB; the default 256 KB WebClient codec
    # buffer throws DataBufferLimitException without this setting.
    codec-buffer-size-mb: 18
    # Requests are held until the next wall-clock minute once usage reaches these levels.
    # Binance hard limits: spot 6 000, futures 2 400.
    spot-weight-threshold: 5800
    futures-weight-threshold: 2200

  ticker:
    # ISO-8601 duration. fixedDelayString — the next run starts this long AFTER the previous completes.
    refresh-interval: PT4H

  orderbook:
    # Price levels further than this fraction from the mid-price are discarded to bound memory.
    price-filter-threshold: 0.1
    # Snapshot dispatch rate per market (milliseconds).
    spot-snapshot-dispatch-rate-ms: 6000
    futures-snapshot-dispatch-rate-ms: 6000
    spot-snapshot-queue-size: 10
    futures-snapshot-queue-size: 10

  classification:
    # Max (symbol, market) targets allowed in a single rule upsert/delete request — bounds
    # one transaction's size.
    max-targets-per-request: 200

  billing:
    # Free trial granted on registration (ISO-8601 duration).
    trial-duration: P7D
    # Default region for the stub RegionResolver (UZS / Uzbekistan). Real geo/phone resolution
    # is future work; nothing is persisted yet.
    default-currency: UZS
    default-country: UZ

  disruptor:
    shard-count: 2
    ring-buffer-size: 65536

  websocket:
    spot-stream-url: wss://stream.binance.com/ws
    futures-stream-url: wss://fstream.binance.com/ws
    connection-count-spot: 1
    connection-count-futures: 3
    subscribe-chunk-size: 400
    reconnect-initial-delay-ms: 100
    reconnect-max-delay-ms: 30000
    # How often to send a WebSocket PING to Binance to prevent server-side idle close (1006).
    heartbeat-interval-seconds: 120

  jwt:
    secret: "${JWT_SECRET:}"
    access-token-expiry: PT3H
    refresh-token-expiry: P7D
